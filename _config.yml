# Site Settings
title: "Box of Hammers"
name: "BoxOfHammers"
description: "Homelab, F5, and automation adventures."
url: "https://itlostandfound.github.io"
baseurl: "/Jekyll.GitHub"
timezone: America/Chicago
locale: "en-US"

# Minimal Mistakes Theme via remote
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

# Site Author
author:
  name: "BoxOfHammers"
  avatar: "/assets/images/avatar.png"
  bio: "F5 ADC Engineer. Home labber. Learning Python."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/itlostandfound"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/itlostandfound"

# Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Navigation
navigation:
  - title: "Home"
    url: /
  - title: "About"
    url: /about/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Build settings
markdown: kramdown
kramdown:
  input: GFM

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/