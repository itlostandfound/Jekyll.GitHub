# Site Settings
title: "IT Lost and Found"
name: "Michael Yates"
description: "Infrastructure, home labs, automation, and AI builds."
url: "https://itlostandfound.github.io"
baseurl: "/Jekyll.GitHub"
permalink: /blog/:year/:month/:day/:title.html
timezone: America/Chicago
locale: "en-US"

# Minimal Mistakes Theme via remote (kept for fallback / SEO tags)
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

# Include _pages directory
include:
  - _pages

# Site Author
author:
  name: "Michael Yates"
  bio: "Infrastructure, home labs, automation, and AI builds."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/itlostandfound"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/itlostandfound"

# Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: true
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  # _pages directory
  - scope:
      path: "_pages"
    values:
      layout: single

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Build settings
future: true
markdown: kramdown
kramdown:
  input: GFM

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/